name: Keeper Bot — Claim Expired Vaults

on:
  schedule:
    - cron: "0 0 */2 * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you triggering manually?"
        required: false
        default: "manual check"

# checkout@v5 / setup-node@v5 use Node 24-compatible action runtime (Node 20 deprecation).
jobs:
  claim-expired-vaults:
    name: Scan and Claim Expired Vaults
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      # Full install uses root .npmrc (legacy-peer-deps). Omit dev to skip bankrun + test-only
      # packages — keeper only needs @coral-xyz/anchor, @solana/spl-token, ts-node, etc.
      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Check IDL exists
        run: |
          if [ ! -f "target/idl/proof_pol.json" ]; then
            echo "ERROR: target/idl/proof_pol.json not found."
            echo "The IDL must be committed to the repository."
            echo "Run: anchor build  →  commit target/idl/ and target/types/"
            exit 1
          fi
          echo "IDL found: target/idl/proof_pol.json"

      - name: Show keeper wallet address
        env:
          KEEPER_KEYPAIR: ${{ secrets.KEEPER_KEYPAIR }}
        run: |
          node -e "
            const { Keypair } = require('@solana/web3.js');
            const raw = process.env.KEEPER_KEYPAIR;
            if (!raw || !raw.trim()) { console.error('KEEPER_KEYPAIR secret is empty'); process.exit(1); }
            let arr;
            try { arr = JSON.parse(raw.trim()); } catch (e) {
              console.error('KEEPER_KEYPAIR must be valid JSON: the full Solana keypair file as one line [n,n,...]');
              console.error('Not base58. Copy from: cat keeper-wallet.json');
              process.exit(1);
            }
            const kp = Keypair.fromSecretKey(Uint8Array.from(arr));
            console.log('Keeper wallet:', kp.publicKey.toBase58());
          "

      - name: Run keeper — scan and claim expired vaults
        env:
          KEEPER_KEYPAIR: ${{ secrets.KEEPER_KEYPAIR }}
          RPC_URL: ${{ secrets.RPC_URL || 'https://api.devnet.solana.com' }}
          CI: "true"
        run: npx ts-node keeper/keeper.ts

      - name: Done
        run: echo "Keeper run complete. If no vaults were expired, the scan still succeeded (no claims)."
