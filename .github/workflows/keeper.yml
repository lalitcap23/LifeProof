name: Keeper Bot — Claim Expired Vaults

on:
  schedule:
    - cron: "0 0 */2 * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you triggering manually?"
        required: false
        default: "manual check"

# GitHub is deprecating Actions that still embed Node 20. checkout@v5 / setup-node@v5
# run on Node 24. See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
jobs:
  claim-expired-vaults:
    name: Scan and Claim Expired Vaults
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Check IDL exists
        run: |
          if [ ! -f "target/idl/proof_pol.json" ]; then
            echo "ERROR: target/idl/proof_pol.json not found."
            echo "The IDL must be committed to the repository."
            echo "Run: anchor build  →  commit target/idl/ and target/types/"
            exit 1
          fi
          echo "IDL found: target/idl/proof_pol.json"

      - name: Show keeper wallet address
        env:
          KEEPER_KEYPAIR: ${{ secrets.KEEPER_KEYPAIR }}
        run: |
          node -e "
            const { Keypair } = require('@solana/web3.js');
            const arr = JSON.parse(process.env.KEEPER_KEYPAIR);
            const kp = Keypair.fromSecretKey(Uint8Array.from(arr));
            console.log('Keeper wallet:', kp.publicKey.toBase58());
          "

      # Scans every active vault; if none are past deadline + grace, the script
      # exits successfully with nothing to claim — that is expected.
      - name: Run keeper — scan and claim expired vaults
        env:
          KEEPER_KEYPAIR: ${{ secrets.KEEPER_KEYPAIR }}
          RPC_URL: ${{ secrets.RPC_URL || 'https://api.devnet.solana.com' }}
          CI: "true"
        run: npx ts-node keeper/keeper.ts

      - name: Done
        run: echo "Keeper run complete. If no vaults were expired, the scan still succeeded (no claims)."
